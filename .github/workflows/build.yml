name: Build Portable Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v3.3.0)'
        required: true
        default: 'v3.3.0'
  push:
    tags:
      - 'v*'
  release:
    types: [created]

env:
  NODE_VERSION: '22.x'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Build theme
        run: npm run build:theme

      - name: Build application
        run: npm run build

      - name: Pack to directory
        run: npm run pack:dir

      - name: Check directory
        shell: powershell
        run: |
          echo "Checking directory structure..."
          Get-ChildItem -Path "dist" -Recurse | Select-Object -First 30 | Format-Table -AutoSize

      - name: Find win-unpacked
        shell: powershell
        run: |
          if (Test-Path "dist\win-unpacked") {
            echo "win-unpacked found!"
            Get-ChildItem -Path "dist\win-unpacked" | Format-Table -AutoSize
          }

      - name: Create portable version
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "portable"
          Copy-Item -Recurse -Path "dist\win-unpacked\*" -Destination "portable\"
          echo "Portable version created on $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" | Out-File -FilePath "portable\portable.txt" -Encoding UTF8
          echo "Portable version created successfully!"
          Get-ChildItem -Path "portable" | Format-Table -AutoSize

      - name: Upload portable version
        uses: actions/upload-artifact@v4
        with:
          name: LX-Music-Portable-win-x64
          path: portable/
          retention-days: 90

      - name: Create zip for release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        run: |
          Compress-Archive -Path "portable\*" -DestinationPath "LX-Music-Portable-win-x64.zip" -Force
          echo "Created zip file successfully!"

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            LX-Music-Portable-win-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
