name: Build Portable Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v3.3.0)'
        required: true
        default: 'v3.3.0'
  push:
    tags:
      - 'v*'
  release:
    types: [created]

env:
  NODE_VERSION: '20.x'
  ELECTRON_VERSION: '37.6.1'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            architecture: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build theme
        run: npm run build:theme

      - name: Pack application
        run: npm run pack
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Create portable folder
        run: |
          New-Item -ItemType Directory -Force -Path "build\portable"
          Copy-Item -Recurse -Path "dist\win-unpacked\*" -Destination "build\portable\"
          New-Item -ItemType File -Force -Path "build\portable\portable.txt"
          "Portable version created on $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" | Out-File -FilePath "build\portable\portable.txt" -Encoding UTF8

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: LX-Music-Portable-${{ matrix.architecture }}
          path: build/portable/
          retention-days: 30

      - name: Upload build folder
        uses: actions/upload-artifact@v4
        with:
          name: build-folder-${{ matrix.architecture }}
          path: build/
          retention-days: 30

      - name: Upload dist folder
        uses: actions/upload-artifact@v4
        with:
          name: dist-folder-${{ matrix.architecture }}
          path: dist/
          retention-days: 30

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download portable artifact
        uses: actions/download-artifact@v4
        with:
          name: LX-Music-Portable-x64
          path: portable

      - name: Create portable.zip
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.version != ''
        shell: bash
        run: |
          cd portable
          powershell -Command "Compress-Archive -Path '*' -DestinationPath '../LX-Music-Portable-win-x64.zip' -Force"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            LX-Music-Portable-win-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-release-artifact@v4
        with:
          name: LX-Music-Portable-win-x64
          path: portable/
          retention-days: 90
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
