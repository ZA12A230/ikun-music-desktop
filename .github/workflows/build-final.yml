name: Build Portable Version (Final)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: false
        default: 'v3.3.0-custom'

env:
  NODE_VERSION: '20.x'
  ELECTRON_VERSION: '37.6.1'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            architecture: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build theme
        run: npm run build:theme

      - name: Pack application
        run: npm run pack
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Create build folder structure
        run: |
          New-Item -ItemType Directory -Force -Path "build\portable"
          Copy-Item -Recurse -Path "dist\win-unpacked\*" -Destination "build\portable\"
          New-Item -ItemType File -Force -Path "build\portable\portable.txt"
          "Portable version created on $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" | Out-File -FilePath "build\portable\portable.txt" -Encoding UTF8

      - name: Upload Build Folder
        uses: actions/upload-artifact@v4
        with:
          name: LX-Music-Build-Folder
          path: build/
          retention-days: 30

      - name: Upload Compressed Version
        uses: actions/upload-artifact@v4
        with:
          name: LX-Music-Compressed
          path: dist/
          retention-days: 30
