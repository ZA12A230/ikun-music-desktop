name: Build Portable Version (Final)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v3.3.0)'
        required: true
        default: 'v3.3.0'
  push:
    branches:
      - main
  tags:
    - 'v*'
  release:
    types: [created]

env:
  NODE_VERSION: '22.x'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm install
      - name: Build theme
        run: npm run build:theme
      - name: Build application
        run: npm run build
      - name: Pack to directory
        run: npm run pack:dir
      - name: Debug - List all directories
        shell: powershell
        run: |
          Write-Host "=== Debug - Listing all directories ==="
          Get-ChildItem -Directory -Recurse -Depth 3 | Select-Object FullName | Format-Table -AutoSize
          Write-Host ""
          Write-Host "=== Debug - Checking build directory ==="
          if (Test-Path "build") {
            Write-Host "build directory found!"
            Get-ChildItem -Path "build" -Recurse -Depth 2 | Select-Object FullName | Format-Table -AutoSize
          } else {
            Write-Host "build directory NOT found!"
          }
      - name: Upload entire build directory
        uses: actions/upload-artifact@v4
        with:
          name: LX-Music-Build-Folder
          path: build/
          retention-days: 90
      - name: Find and upload portable executable
        shell: powershell
        run: |
          Write-Host "=== Finding portable files ==="
          $portableDirs = Get-ChildItem -Directory -Path "build" -ErrorAction SilentlyContinue | Where-Object {
            $_.Name -like "*unpack*" -or $_.Name -like "*portable*" -or $_.Name -like "*dir*"
          }
          if ($portableDirs) {
            Write-Host "Found potential portable directories:"
            foreach ($dir in $portableDirs) {
              Write-Host " - $($dir.FullName)"
              $zipPath = "portable-$($dir.Name).zip"
              Compress-Archive -Path "$($dir.FullName)\*" -DestinationPath $zipPath -Force
              Write-Host "Created $zipPath"
            }
          } else {
            Write-Host "No unpacked directories found. Looking for exe files..."
            $exeFiles = Get-ChildItem -File -Path "build" -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue
            if ($exeFiles) {
              Write-Host "Found exe files:"
              foreach ($exe in $exeFiles) {
                Write-Host " - $($exe.FullName)"
              }
            }
          }
      - name: Upload any found zip files
        uses: actions/upload-artifact@v4
        with:
          name: LX-Music-Compressed
          path: "*.zip"
          retention-days: 90
