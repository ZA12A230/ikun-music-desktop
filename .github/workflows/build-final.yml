name: Build
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
env:
  IS_CI: 'true'

jobs:
  Windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Get npm cache directory
        shell: pwsh
        run: echo "NPM_CACHE=$(npm config get cache)" >> $env:GITHUB_ENV

      - name: Show Env
        run: echo "${{ env.NPM_CACHE }}"

      - name: Setup Node Env
        env:
          NPM_CACHE: ${{ env.NPM_CACHE }}
        uses: ./.github/actions/setup

      - name: Build src code
        run: |
          git status --porcelain
          npm run build

      - name: Pack to directory
        run: npm run pack:dir

      - name: Create portable folder and copy files
        shell: pwsh
        run: |
          Write-Host "=== Creating portable folder ==="
          New-Item -ItemType Directory -Force -Path "build/portable"
          Copy-Item -Recurse -Path "build/win-unpacked/*" -Destination "build/portable/"
          New-Item -ItemType File -Force -Path "build/portable/portable.txt"
          "Portable version created on $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" | Out-File -FilePath "build/portable/portable.txt" -Encoding UTF8
          Write-Host "=== build directory contents ==="
          Get-ChildItem -Path "build" -Recurse -Depth 2 | Select-Object FullName | Format-Table -AutoSize

      - name: Upload entire build directory
        uses: actions/upload-artifact@v4
        with:
          name: LX-Music-Build-Folder
          path: build/
          retention-days: 90

      - name: Upload compressed portable version
        uses: actions/upload-artifact@v4
        with:
          name: LX-Music-Portable
          path: build/portable/
          retention-days: 90
